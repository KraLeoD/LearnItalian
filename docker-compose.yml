services:
  app:
    build:
      context: .
    image: meine-saetze:local
    platform: linux/amd64
    init: true
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "8080"
      DATA_DIR: /data
      PROVIDER_MODE: "${PROVIDER_MODE:-mock}"
      AZURE_TRANSLATOR_KEY: "${AZURE_TRANSLATOR_KEY:-}"
      AZURE_TRANSLATOR_ENDPOINT: "${AZURE_TRANSLATOR_ENDPOINT:-https://api.cognitive.microsofttranslator.com}"
      AZURE_TRANSLATOR_REGION: "${AZURE_TRANSLATOR_REGION:-westeurope}"
      AZURE_SPEECH_KEY: "${AZURE_SPEECH_KEY:-}"
      AZURE_SPEECH_ENDPOINT: "${AZURE_SPEECH_ENDPOINT:-}"
      AZURE_SPEECH_REGION: "${AZURE_SPEECH_REGION:-westeurope}"
      AZURE_SPEECH_VOICE: "${AZURE_SPEECH_VOICE:-it-IT-ElsaNeural}"
      TRANSLATION_MONTHLY_CHAR_LIMIT: "${TRANSLATION_MONTHLY_CHAR_LIMIT:-1500000}"
      SPEECH_MONTHLY_CHAR_LIMIT: "${SPEECH_MONTHLY_CHAR_LIMIT:-400000}"
      MAX_TEXT_LENGTH: "${MAX_TEXT_LENGTH:-2000}"
      GENERATION_REQUESTS_PER_MINUTE: "${GENERATION_REQUESTS_PER_MINUTE:-10}"
      PROVIDER_TIMEOUT_MS: "${PROVIDER_TIMEOUT_MS:-10000}"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    volumes:
      - language-data:/data
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8080/api/health/ready').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  language-data:
